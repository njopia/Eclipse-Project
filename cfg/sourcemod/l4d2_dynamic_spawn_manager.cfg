// L4D2 Dynamic Spawn Manager Configuration
// Generated by l4d2_dynamic_spawn_manager.sp v1.1.1

// ====================================
// GENERAL SETTINGS
// ====================================

// Enable/Disable the plugin
// 0 = Disabled, 1 = Enabled
sm_dsm_enabled "1"

// How often (in seconds) to update spawn rates based on player count
// Default: 5.0 seconds
sm_dsm_update_interval "5.0"

// ====================================
// AUTO HORDE SETTINGS
// ====================================

// Enable automatic forced panic events
// 0 = Disabled, 1 = Enabled
sm_dsm_auto_horde "1"

// Interval (in seconds) to force panic events
// Set to 0 to disable
// Default: 60.0 seconds (1 minute)
sm_dsm_force_horde_interval "60.0"

// ====================================
// CHAT FEEDBACK SETTINGS
// ====================================

// Show spawn adjustments in chat
// 0 = Disabled (no messages)
// 1 = Enabled (all players see messages)
// 2 = Admins Only (only admins see messages)
// Default: 1
sm_dsm_chat_feedback "1"

// Minimum seconds between chat feedback messages
// Prevents spam when players join/leave frequently
// Default: 30 seconds
sm_dsm_feedback_interval "30"

// ====================================
// HEALTH MULTIPLIERS
// ====================================

// Tank health multiplier
// Default: 1.0 (no change)
// Example: 1.5 = 150% health, 0.5 = 50% health
sm_dsm_tank_hp_mult "1.0"

// Witch health multiplier
// Default: 1.0 (no change)
sm_dsm_witch_hp_mult "1.0"

// ====================================
// DIFFICULTY ADJUSTMENTS
// ====================================

// Tank HP reduction on Hard difficulty (not applied in Survival mode)
// Default: 5000
// On Hard, Tank HP = (Calculated HP - this value) * tank_hp_mult
sm_dsm_diff_tank_reduction "5000"

// ====================================
// NOTES
// ====================================
// The plugin automatically scales:
// - Common infected horde spawn intervals (faster with more players)
// - Special infected limits per type (Boomer, Charger, Hunter, etc.)
// - Total special infected on map at once
// - Boss health (Tank, Witch)
// - Special infected spawn times
//
// Scaling is based on:
// - Number of human players (4-16, optimized for max 16)
// - Current difficulty (Easy/Normal/Hard/Impossible)
// - Gamemode (Coop/Realism/Survival - NOT Versus)
//
// Chat Feedback Examples:
// - [Dynamic Spawn] Sistema de spawn dinámico activado (Max: 16 jugadores)
// - [Dynamic Spawn] Ajustado para 8 jugadores
// - ↳ Especiales: 8 | Hordas: 90-140s | Tank: 6000HP | Witch: 3000HP
// - [Dynamic Spawn] Horda forzada activada!
//
// ====================================
