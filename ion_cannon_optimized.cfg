// Ion Cannon v2.0.0 - Buy System Ready
// Configuración optimizada para sistemas de compras

// ==================== VISUALES ====================
// Modelos y efectos
ic_model_flare "models/props_unique/hospital/iv_pole.mdl"
ic_sound_crackle "ambient/energy/zap9.wav"
ic_sound_ion "vehicles/airboat/fan_blade_fullthrottle_loop1.wav"
ic_particle_flare "weapon_pipebomb"
ic_particle_fuse "weapon_pipebomb"
ic_sprite_beam "materials/sprites/laserbeam.vmt"
ic_sprite_halo "materials/sprites/halo01.vmt"

// ==================== TEMPORIZACIÓN ====================
// Secuencia del Ion Cannon
ic_delay "10.0"              // Delay hasta primera explosión (segundos)
ic_window "17.0"             // Duración total del efecto (segundos)
ic_pulse_every "3.0"         // Frecuencia de daño continuo (segundos)

// Intervalos de efectos visuales
ic_tick_rotate "0.5"         // Rayos orbitales cada 0.5s
ic_tick_ring "5.0"           // Anillos grandes cada 5s (3 total)
ic_tick_center "1.5"         // Rayo central cada 1.5s

// Configuración de anillos
ic_blast_rings "3"           // Cantidad de anillos grandes
ic_blast_gap "0.3"           // Intervalo entre anillos (segundos)
ic_visual_scale "1.0"        // Multiplicador de velocidad visual

// ==================== DAÑO ====================
// Balance de daño (SOLO a infectados)
ic_dmg_common "10"           // Daño a infectados comunes por pulso
ic_dmg_si "10"               // Daño a infectados especiales por pulso

// ==================== SCREEN SHAKE ====================
// Radios de vibración de pantalla
ic_shake_r1 "900"            // Radio shake fuerte (unidades)
ic_shake_r2 "1800"           // Radio shake medio (unidades)
ic_shake_r3 "2600"           // Radio shake suave (unidades)

// ==================== SISTEMA DE COMPRAS (NUEVO) ====================
// Sistema de cargas
ic_max_charges "3"           // Máximo de cargas por jugador (1-10)
ic_charges_per_round "1"     // Cargas restauradas al inicio de cada ronda (0-10)
ic_charges_on_buy "1"        // Cargas otorgadas al comprar (1-5)

// Cooldown
ic_cooldown "45.0"           // Cooldown entre usos en segundos (0-300)
                             // 0 = sin cooldown
                             // 45 = balance recomendado para buy systems
                             // 60+ = uso más restrictivo

// ==================== PERMISOS ====================
// Control de acceso para comando directo !ion
ic_access_flag ""            // Flag requerido (vacío = todos pueden usar)
                             // Ejemplos: "b" = admin generic
                             //          "z" = root
                             //          "" = todos (recomendado para buy systems)

// ==================== DEBUG ====================
ic_debug_mode "1"            // Mostrar mensajes de debug en chat (0=No, 1=Sí) [ACTIVO PARA TESTING]
                             // Los mensajes SIEMPRE se guardan en logs/ion_cannon.log
                             // Cambiar a "0" cuando termine el testing

// ==================== BALANCE SUGERIDO ====================
// Para sistemas de compras:
//   - Costo: 3000-5000 puntos
//   - Cooldown: 45-60 segundos
//   - Cargas por compra: 1 uso
//   - Bonus por kill: 10-20 puntos
//   - Kills promedio: 15-30 infectados
//   - ROI (retorno): 10-20% del costo

// ==================== NOTAS ====================
// 1. El Ion Cannon NUNCA daña sobrevivientes (team 2)
// 2. Solo daña infectados comunes, witches e infectados especiales (team 3)
// 3. Los efectos visuales son puramente estéticos (no causan daño adicional)
// 4. El sistema de cargas es independiente del cooldown
// 5. Las cargas se restauran automáticamente al inicio de cada ronda

// ==================== COMANDOS DISPONIBLES ====================
// Usuarios:
//   sm_ion / !ion          - Activar Ion Cannon (consume 1 carga)
//   sm_ion_info            - Ver tu información de Ion Cannon
//
// Admins (CHEATS):
//   sm_ion_give <player> <charges>  - Otorgar cargas
//   sm_ion_reset <player>           - Resetear cooldown
//
// Admins (GENERIC):
//   sm_ion_info <player>   - Ver información de otro jugador

// ==================== API PARA DESARROLLADORES ====================
// Natives disponibles:
//   Ion_CanUse(client)           - Verificar si puede usar
//   Ion_Activate(client)         - Activar Ion Cannon
//   Ion_GetCooldown(client)      - Obtener cooldown restante
//   Ion_GetCharges(client)       - Obtener cargas restantes
//   Ion_SetCharges(client, num)  - Establecer cargas
//
// Forwards disponibles:
//   Ion_OnActivate(client)       - Cuando se activa
//   Ion_OnComplete(client, kills) - Cuando termina (para recompensar puntos)
