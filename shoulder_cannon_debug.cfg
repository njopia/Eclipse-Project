// =====================================================
// Shoulder Cannon - Configuración de Debug
// =====================================================
// Ejecutar con: exec shoulder_cannon_debug.cfg

// Activar debug mode
sc_debug 1

// Mostrar logs en consola
sm_cvar log 1
sm_cvar sv_logecho 1

echo ""
echo "========================================"
echo "Shoulder Cannon DEBUG MODE ENABLED"
echo "========================================"
echo ""
echo "Comandos disponibles:"
echo "  !sc o /sc     - Abrir menu del cannon"
echo "  sm_sc         - Abrir menu (alternativo)"
echo ""
echo "IMPORTANTE:"
echo "  - Todos los logs se escriben en logs/L*.log"
echo "  - Los logs DEBUG aparecen con [SC_DEBUG]"
echo "  - Para desactivar debug: sc_debug 0"
echo ""
echo "========================================"
echo ""
